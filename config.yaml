# TutorialVault Configuration
# All paths are relative to this file's directory unless absolute.

# --- Storage ---
store:
  # Where LanceDB stores its data. Relative to project root.
  path: .lancedb
  # Main table name for chunks
  table: tutorials
  # Episode summaries table
  summaries_table: episode_summaries

# --- Embedding ---
embedding:
  # HuggingFace ONNX model repo
  model: onnx-community/embeddinggemma-300m-ONNX
  # Quantization variant: fp32 (1.2GB), q8 (295MB), q4 (188MB), q4f16 (168MB)
  variant: q4
  # Vector dimension (768 for EmbeddingGemma, 1024 for BGE-M3)
  dim: 768
  # Device: "cuda" for GPU, "cpu" for CPU-only
  device: auto  # auto = cuda if available, else cpu
  # Batch size for encoding
  batch_size: 32

# --- Chunking ---
chunking:
  # Target chunk duration in seconds
  target_sec: 90
  # Overlap with previous chunk in seconds
  overlap_sec: 15

# --- Search ---
search:
  # FlashRank reranker model (set to null to disable)
  # Options: ms-marco-MiniLM-L-12-v2 (34MB, best quality)
  #          ms-marco-TinyBERT-L-2-v2 (4MB, fastest)
  #          ms-marco-MultiBERT-L-12 (150MB, multilingual)
  reranker_model: ms-marco-MiniLM-L-12-v2
  # Parent window expansion: seconds before/after matched chunk
  parent_window_sec: 150
  # Number of candidates to pull before reranking
  candidate_count: 30
  # RRF constant (higher = less weight on top ranks)
  rrf_k: 60

# --- Transcription ---
transcription:
  # Whisper model size: tiny, base, small.en, small, medium, large-v2, large-v3
  # small.en is the best speed/quality tradeoff for English on CPU
  model: small.en
  # Device: cuda (GPU) or cpu
  device: cpu
  # Compute type: float16 (GPU), int8 (CPU fast), int8_float16 (GPU fast)
  compute_type: int8
  # Language: en, null (auto-detect), or any language code
  language: en

# --- Provider (LLM inference) ---
provider:
  # Active provider: claude_code, opencode, codex, kilo, local_gguf, custom
  active: kilo
  # Default model per provider (override in provider-specific config)
  claude_code:
    model: sonnet
  opencode:
    model: opencode/minimax-m2.5-free
  codex:
    model: o4-mini
  kilo:
    model: kilo-auto/free
  local_gguf:
    model_path: null  # path to .gguf file
    n_gpu_layers: -1  # -1 = all layers on GPU
    n_ctx: 8192
  custom:
    base_url: null
    api_key: null
    model: null
